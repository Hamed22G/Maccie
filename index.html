<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#DA291C"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Diensten"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon.png"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css"/>
<title>Workday Tracker</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --red:#DA291C;--red2:#b8220f;--gold:#FFBC0D;
  --bg:#F7F5F0;--card:#FFFFFF;--card2:#F0EDE8;
  --border:#E0DCD5;--text:#1A1714;--text2:#6B6560;--text3:#A09890;
  --green:#2E7D32;--orange:#E65100;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
}
@media(prefers-color-scheme:dark){:root{
  --bg:#111;--card:#1E1E1E;--card2:#252525;
  --border:#333;--text:#F5F5F0;--text2:#999;--text3:#666;
}}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;}
.app{display:flex;flex-direction:column;height:100vh;height:100dvh;}

/* TOPBAR */
.topbar{background:var(--red);padding:calc(var(--safe-top) + 10px) 14px 12px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.topbar-left{display:flex;align-items:center;gap:10px;}
.logo{width:36px;height:36px;background:var(--card);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:var(--red);}
.topbar h1{font-size:17px;font-weight:600;color:white;}
.topbar p{font-size:12px;color:rgba(255,255,255,0.8);}
.topbar-right{display:flex;gap:6px;}
.top-btn{background:rgba(255,255,255,0.2);border:none;border-radius:8px;padding:6px 10px;font-size:12px;font-weight:500;color:white;cursor:pointer;font-family:inherit;}
.top-btn:active{opacity:0.7;}

/* NEXT SHIFT BANNER */
.next-banner{background:var(--red);padding:0 14px 12px;flex-shrink:0;}
.next-pill{background:rgba(255,255,255,0.15);border-radius:10px;padding:8px 12px;display:flex;align-items:center;gap:8px;}
.next-dot{width:8px;height:8px;border-radius:50%;background:#4ADE80;flex-shrink:0;}
.next-text{font-size:13px;color:white;}
.next-text strong{font-weight:600;}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;padding:12px 12px 0;flex-shrink:0;}
.stat{background:var(--card);border-radius:14px;padding:12px 14px;border:0.5px solid var(--border);}
.stat-lbl{font-size:11px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:4px;}
.stat-val{font-size:24px;font-weight:700;color:var(--text);line-height:1;}
.stat-sub{font-size:12px;color:var(--text3);margin-top:3px;}

/* SCREENS */
.screen{flex:1;overflow-y:auto;display:none;flex-direction:column;-webkit-overflow-scrolling:touch;}
.screen.active{display:flex;}

/* CALENDAR */
.cal-header{display:flex;align-items:center;justify-content:space-between;padding:12px 14px 8px;flex-shrink:0;}
.cal-month{font-size:16px;font-weight:600;color:var(--text);}
.cal-nav{display:flex;gap:6px;}
.cal-nav button{background:var(--card);border:0.5px solid var(--border);border-radius:8px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text);font-size:16px;}
.cal-grid{padding:0 14px;flex-shrink:0;}
.cal-days{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:4px;}
.cal-day-lbl{text-align:center;font-size:11px;font-weight:500;color:var(--text3);padding:4px 0;text-transform:uppercase;}
.cal-cells{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.cal-cell{min-height:44px;border-radius:10px;padding:4px 5px;cursor:pointer;position:relative;transition:background 0.1s;}
.cal-cell:active{background:var(--card2)!important;}
.cal-cell.other-month .cal-cell-num{color:var(--text3);}
.cal-cell.today{background:var(--red)!important;}
.cal-cell.today .cal-cell-num{color:white!important;font-weight:700;}
.cal-cell.has-shift{background:var(--card);border:0.5px solid var(--border);}
.cal-cell.selected{outline:2px solid var(--red);outline-offset:1px;}
.cal-cell-num{font-size:13px;font-weight:500;color:var(--text);}
.cal-dot{width:5px;height:5px;border-radius:50%;margin:2px auto 0;}
.cal-dot.worked{background:var(--green);}
.cal-dot.planned{background:var(--red);}
.cal-dot.sick{background:var(--orange);}
.cal-hrs{font-size:9px;color:var(--text2);text-align:right;line-height:1;}

/* SHIFT LIST */
.list-area{padding:10px 14px 100px;flex:1;}
.list-hdr{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.05em;margin:10px 0 6px;}
.shift-card{background:var(--card);border-radius:14px;padding:12px 14px;margin-bottom:8px;border:0.5px solid var(--border);display:flex;align-items:center;gap:12px;}
.shift-card.planned{border-left:3px solid var(--red);border-radius:0 14px 14px 0;}
.shift-card.worked{border-left:3px solid var(--green);border-radius:0 14px 14px 0;}
.shift-card.sick{border-left:3px solid var(--orange);border-radius:0 14px 14px 0;}
.date-col{text-align:center;min-width:36px;}
.date-day{font-size:10px;font-weight:600;color:var(--text2);text-transform:uppercase;}
.date-num{font-size:20px;font-weight:700;color:var(--text);line-height:1.1;}
.date-mon{font-size:10px;color:var(--text3);}
.vline{width:1px;height:38px;background:var(--border);}
.shift-mid{flex:1;min-width:0;}
.shift-time{font-size:14px;font-weight:600;color:var(--text);}
.shift-detail{font-size:12px;color:var(--text2);margin-top:1px;}
.shift-note{font-size:11px;color:var(--text3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.badge{font-size:10px;padding:2px 8px;border-radius:99px;font-weight:600;display:inline-block;}
.badge-planned{background:#FFF0EF;color:#993C1D;}
.badge-worked{background:#E8F5E9;color:#2E7D32;}
.badge-sick{background:#FFF3E0;color:#E65100;}
.del-btn{background:none;border:none;cursor:pointer;color:var(--text3);font-size:20px;padding:6px;border-radius:8px;line-height:1;}
.del-btn:active{color:var(--red);}
.empty-state{text-align:center;padding:2.5rem 1rem;color:var(--text3);font-size:13px;}
.empty-state i{font-size:36px;display:block;margin-bottom:8px;}

/* ADD SCREEN */
.add-wrap{padding:12px 14px 100px;flex:1;overflow-y:auto;}
.section-card{background:var(--card);border-radius:16px;border:0.5px solid var(--border);margin-bottom:12px;overflow:hidden;}
.section-card-title{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.05em;padding:10px 14px 0;}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:0;}
.field{padding:10px 14px;border-bottom:0.5px solid var(--border);}
.field:last-child{border-bottom:none;}
.field.full{grid-column:1/-1;}
.field-lbl{font-size:11px;font-weight:500;color:var(--text2);margin-bottom:5px;display:block;}
input,select,textarea{font-size:15px;width:100%;background:transparent;border:none;color:var(--text);font-family:inherit;outline:none;-webkit-appearance:none;}
select{cursor:pointer;}
textarea{resize:none;min-height:40px;}
.save-btn{width:100%;background:var(--red);color:white;border:none;border-radius:14px;padding:14px;font-size:16px;font-weight:600;cursor:pointer;margin-bottom:10px;font-family:inherit;}
.save-btn:active{background:var(--red2);}
.today-btn{width:100%;background:var(--card);color:var(--text);border:0.5px solid var(--border);border-radius:14px;padding:13px;font-size:15px;font-weight:500;cursor:pointer;margin-bottom:10px;font-family:inherit;}
.gmail-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:8px;background:var(--card);border:0.5px solid var(--border);border-radius:14px;padding:13px;font-size:15px;color:var(--text);cursor:pointer;margin-bottom:12px;font-family:inherit;}
.gmail-btn:active{opacity:0.7;}

/* BANNER */
.banner{margin:0 14px 8px;background:var(--card);border-radius:12px;padding:10px 14px;font-size:13px;color:var(--text2);text-align:center;display:none;border:0.5px solid var(--border);}

/* NAVBAR */
.navbar{display:flex;background:var(--card);border-top:0.5px solid var(--border);padding:6px 0 calc(var(--safe-bot) + 6px);flex-shrink:0;}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;cursor:pointer;font-size:10px;font-weight:500;color:var(--text3);padding:4px 0;font-family:inherit;}
.nav-btn.active{color:var(--red);}
.nav-btn i{font-size:22px;}
</style>
</head>
<body>
<div class="app">

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-left">
    <div class="logo">M</div>
    <div>
      <h1>Workday Tracker</h1>
      <p>McDonald's diensten & uren</p>
    </div>
  </div>
  <div class="topbar-right">
    <button class="top-btn" onclick="exportCSV()">CSV</button>
    <button class="top-btn" onclick="clearAll()">Wis</button>
  </div>
</div>
<div class="next-banner">
  <div class="next-pill">
    <div class="next-dot"></div>
    <div class="next-text" id="next-text">Geen aankomende dienst</div>
  </div>
</div>

<!-- HOME SCREEN -->
<div class="screen active" id="screen-home">
  <div class="stats-row">
    <div class="stat"><div class="stat-lbl">Deze week</div><div class="stat-val" id="s-week">0h</div><div class="stat-sub" id="s-week-sub">0 diensten</div></div>
    <div class="stat"><div class="stat-lbl">Deze maand</div><div class="stat-val" id="s-month">0h</div><div class="stat-sub" id="s-month-sub">0 diensten</div></div>
    <div class="stat"><div class="stat-lbl">Verdiend</div><div class="stat-val" id="s-earned">€0</div><div class="stat-sub">deze maand</div></div>
    <div class="stat"><div class="stat-lbl">Aankomend</div><div class="stat-val" id="s-next-val">–</div><div class="stat-sub" id="s-next-sub">volgende dienst</div></div>
  </div>

  <!-- CALENDAR -->
  <div class="cal-header">
    <span class="cal-month" id="cal-title"></span>
    <div class="cal-nav">
      <button onclick="changeMonth(-1)"><i class="ti ti-chevron-left"></i></button>
      <button onclick="changeMonth(0)">Nu</button>
      <button onclick="changeMonth(1)"><i class="ti ti-chevron-right"></i></button>
    </div>
  </div>
  <div class="cal-grid">
    <div class="cal-days" id="cal-days"></div>
    <div class="cal-cells" id="cal-cells"></div>
  </div>

  <div class="banner" id="msg-banner"></div>
  <div class="list-area">
    <div class="list-hdr" id="list-hdr">Diensten</div>
    <div id="shifts-list"></div>
  </div>
</div>

<!-- ADD SCREEN -->
<div class="screen" id="screen-add">
  <div class="add-wrap">
    <button class="gmail-btn" onclick="scanGmail()">
      <i class="ti ti-mail"></i> Importeer uit Gmail
    </button>

    <div class="section-card">
      <div class="section-card-title">Dienst toevoegen</div>
      <div class="field full">
        <label class="field-lbl">Datum</label>
        <input type="date" id="inp-date"/>
      </div>
      <div class="field-row">
        <div class="field">
          <label class="field-lbl">Status</label>
          <select id="inp-status">
            <option value="planned">Gepland</option>
            <option value="worked">Gewerkt</option>
            <option value="sick">Ziek</option>
          </select>
        </div>
        <div class="field">
          <label class="field-lbl">Uurloon (€)</label>
          <input type="number" id="inp-rate" placeholder="Bijv. 13.27" step="0.01"/>
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label class="field-lbl">Begintijd</label>
          <input type="time" id="inp-start"/>
        </div>
        <div class="field">
          <label class="field-lbl">Eindtijd</label>
          <input type="time" id="inp-end"/>
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label class="field-lbl">Pauze (min)</label>
          <input type="number" id="inp-break" placeholder="30" value="30"/>
        </div>
        <div class="field">
          <label class="field-lbl">Locatie</label>
          <input type="text" id="inp-loc" placeholder="Waardenburg"/>
        </div>
      </div>
      <div class="field full">
        <label class="field-lbl">Notitie</label>
        <textarea id="inp-note" placeholder="Keuken, kassa, sluitingsdienst..."></textarea>
      </div>
    </div>

    <button class="save-btn" onclick="addShift()">Dienst opslaan</button>
    <button class="today-btn" onclick="markToday()">Vandaag als gewerkt markeren</button>
  </div>
</div>

<!-- NAVBAR -->
<nav class="navbar">
  <button class="nav-btn active" id="nav-home" onclick="showScreen('home')">
    <i class="ti ti-calendar"></i><span>Kalender</span>
  </button>
  <button class="nav-btn" id="nav-add" onclick="showScreen('add')">
    <i class="ti ti-plus"></i><span>Toevoegen</span>
  </button>
  <button class="nav-btn" id="nav-list" onclick="showAllList()">
    <i class="ti ti-list"></i><span>Alles</span>
  </button>
</nav>
</div>

<script>
const DAYS_S=['zo','ma','di','wo','do','vr','za'];
const MONTHS_NL=['januari','februari','maart','april','mei','juni','juli','augustus','september','oktober','november','december'];
const MONTHS_S=['jan','feb','mrt','apr','mei','jun','jul','aug','sep','okt','nov','dec'];

let shifts=JSON.parse(localStorage.getItem('mcdo_v3')||'[]');
let viewYear=new Date().getFullYear(), viewMonth=new Date().getMonth();
let selectedDate=null, listMode='month';

function save(){localStorage.setItem('mcdo_v3',JSON.stringify(shifts));}

function hrs(s,e,brk=0){
  const[sh,sm]=s.split(':').map(Number);
  const[eh,em]=e.split(':').map(Number);
  let m=(eh*60+em)-(sh*60+sm);
  if(m<0)m+=1440;
  return Math.max(0,(m-brk)/60);
}

function fmt(h){return h%1===0?h+'h':h.toFixed(1)+'h';}

function status(d){
  const t=new Date();t.setHours(0,0,0,0);
  const x=new Date(d);x.setHours(0,0,0,0);
  if(x.getTime()===t.getTime())return'today';
  return x>t?'planned':'past';
}

function showScreen(s){
  document.querySelectorAll('.screen').forEach(sc=>sc.classList.remove('active'));
  document.getElementById('screen-'+s).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  const map={home:'nav-home',add:'nav-add',list:'nav-list'};
  if(map[s])document.getElementById(map[s]).classList.add('active');
  if(s==='home'){renderCalendar();renderList();}
}

function showAllList(){
  listMode='all'; selectedDate=null;
  showScreen('home');
  renderList();
}

function changeMonth(d){
  if(d===0){viewYear=new Date().getFullYear();viewMonth=new Date().getMonth();}
  else{viewMonth+=d;if(viewMonth>11){viewMonth=0;viewYear++;}else if(viewMonth<0){viewMonth=11;viewYear--;}}
  renderCalendar(); renderList();
}

function renderCalendar(){
  const title=document.getElementById('cal-title');
  title.textContent=MONTHS_NL[viewMonth]+' '+viewYear;

  const daysEl=document.getElementById('cal-days');
  daysEl.innerHTML=DAYS_S.map(d=>`<div class="cal-day-lbl">${d}</div>`).join('');

  const first=new Date(viewYear,viewMonth,1).getDay();
  const last=new Date(viewYear,viewMonth+1,0).getDate();
  const cells=document.getElementById('cal-cells');
  cells.innerHTML='';

  const today=new Date();
  // prev month padding
  const prevLast=new Date(viewYear,viewMonth,0).getDate();
  for(let i=first-1;i>=0;i--){
    const d=prevLast-i;
    const cell=document.createElement('div');
    cell.className='cal-cell other-month';
    cell.innerHTML=`<div class="cal-cell-num">${d}</div>`;
    cells.appendChild(cell);
  }
  for(let d=1;d<=last;d++){
    const dateStr=`${viewYear}-${String(viewMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dayShifts=shifts.filter(s=>s.date===dateStr);
    const isToday=today.getFullYear()===viewYear&&today.getMonth()===viewMonth&&today.getDate()===d;
    const isSel=selectedDate===dateStr;
    let cls='cal-cell';
    if(isToday)cls+=' today';
    if(dayShifts.length)cls+=' has-shift';
    if(isSel)cls+=' selected';
    const cell=document.createElement('div');
    cell.className=cls;
    const sh=dayShifts[0];
    const totalH=dayShifts.reduce((a,s)=>a+(s.start&&s.end?hrs(s.start,s.end,s.brk||0):0),0);
    cell.innerHTML=`<div class="cal-cell-num">${d}</div>`+
      (dayShifts.length?`<div class="cal-dot ${sh.status||'planned'}"></div>`+
      (totalH>0?`<div class="cal-hrs">${fmt(totalH)}</div>`:''):'');
    cell.onclick=()=>{selectedDate=dateStr;listMode='day';renderCalendar();renderList();};
    cells.appendChild(cell);
  }
  // next month padding
  const total=first+last;
  const remaining=(7-total%7)%7;
  for(let d=1;d<=remaining;d++){
    const cell=document.createElement('div');
    cell.className='cal-cell other-month';
    cell.innerHTML=`<div class="cal-cell-num">${d}</div>`;
    cells.appendChild(cell);
  }
}

function renderList(){
  const now=new Date();
  let list=shifts;
  let hdr='Alle diensten';
  if(listMode==='day'&&selectedDate){
    list=shifts.filter(s=>s.date===selectedDate);
    const d=new Date(selectedDate);
    hdr=`${DAYS_S[d.getDay()]} ${d.getDate()} ${MONTHS_S[d.getMonth()]}`;
  } else if(listMode==='month'){
    list=shifts.filter(s=>{const d=new Date(s.date);return d.getMonth()===viewMonth&&d.getFullYear()===viewYear;});
    hdr=MONTHS_NL[viewMonth];
  }
  list=[...list].sort((a,b)=>b.date.localeCompare(a.date));
  document.getElementById('list-hdr').textContent=hdr;

  const el=document.getElementById('shifts-list');
  if(list.length===0){
    el.innerHTML='<div class="empty-state"><i class="ti ti-calendar-off"></i>Geen diensten</div>';
  } else {
    el.innerHTML=list.map(s=>{
      const d=new Date(s.date);
      const h=s.start&&s.end?hrs(s.start,s.end,s.brk||0):0;
      const st=s.status||'planned';
      const bc='badge-'+st;
      const bt=st==='planned'?'Gepland':st==='worked'?'Gewerkt':'Ziek';
      const earned=s.rate&&h?'€'+(h*s.rate).toFixed(2):'';
      return `<div class="shift-card ${st}">
        <div class="date-col">
          <div class="date-day">${DAYS_S[d.getDay()]}</div>
          <div class="date-num">${d.getDate()}</div>
          <div class="date-mon">${MONTHS_S[d.getMonth()]}</div>
        </div>
        <div class="vline"></div>
        <div class="shift-mid">
          <div class="shift-time">${s.start&&s.end?s.start+' – '+s.end:'Hele dag'}</div>
          <div class="shift-detail">${h>0?fmt(h)+' gewerkt':''}${s.brk?' · '+s.brk+'min pauze':''}${earned?' · '+earned:''}</div>
          ${s.note?`<div class="shift-note">${s.note}</div>`:''}
          <span class="badge ${bc}">${bt}</span>
        </div>
        <button class="del-btn" onclick="del(${s.id})"><i class="ti ti-trash"></i></button>
      </div>`;
    }).join('');
  }
  renderStats();
}

function renderStats(){
  const now=new Date();
  const startWeek=new Date(now);startWeek.setDate(now.getDate()-now.getDay());startWeek.setHours(0,0,0,0);
  const endWeek=new Date(startWeek);endWeek.setDate(startWeek.getDate()+6);

  const weekShifts=shifts.filter(s=>{const d=new Date(s.date);return d>=startWeek&&d<=endWeek&&s.status==='worked';});
  const monthShifts=shifts.filter(s=>{const d=new Date(s.date);return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear()&&s.status==='worked';});

  const weekH=weekShifts.reduce((a,s)=>a+(s.start&&s.end?hrs(s.start,s.end,s.brk||0):0),0);
  const monthH=monthShifts.reduce((a,s)=>a+(s.start&&s.end?hrs(s.start,s.end,s.brk||0):0),0);
  const earned=monthShifts.reduce((a,s)=>a+(s.rate&&s.start&&s.end?hrs(s.start,s.end,s.brk||0)*s.rate:0),0);

  document.getElementById('s-week').textContent=fmt(weekH);
  document.getElementById('s-week-sub').textContent=weekShifts.length+' diensten';
  document.getElementById('s-month').textContent=fmt(monthH);
  document.getElementById('s-month-sub').textContent=monthShifts.length+' diensten';
  document.getElementById('s-earned').textContent=earned>0?'€'+earned.toFixed(2):'€0';

  const upcoming=shifts.filter(s=>{const d=new Date(s.date);d.setHours(0,0,0,0);const t=new Date();t.setHours(0,0,0,0);return d>=t&&s.status==='planned';}).sort((a,b)=>a.date.localeCompare(b.date));
  if(upcoming.length){
    const n=upcoming[0];
    const d=new Date(n.date);
    document.getElementById('s-next-val').textContent=d.getDate()+' '+MONTHS_S[d.getMonth()];
    document.getElementById('s-next-sub').textContent=n.start?n.start+' – '+n.end:'volgende dienst';
    document.getElementById('next-text').innerHTML=`<strong>Volgende dienst:</strong> ${DAYS_S[d.getDay()]} ${d.getDate()} ${MONTHS_S[d.getMonth()]}${n.start?' om '+n.start:''}`;
  } else {
    document.getElementById('s-next-val').textContent='–';
    document.getElementById('s-next-sub').textContent='niets gepland';
    document.getElementById('next-text').textContent='Geen aankomende dienst opgeslagen';
  }
}

function addShift(){
  const d=document.getElementById('inp-date').value;
  const s=document.getElementById('inp-start').value;
  const e=document.getElementById('inp-end').value;
  const st=document.getElementById('inp-status').value;
  const brk=parseInt(document.getElementById('inp-break').value)||0;
  const rate=parseFloat(document.getElementById('inp-rate').value)||0;
  const loc=document.getElementById('inp-loc').value||"McDonald's";
  const note=document.getElementById('inp-note').value;
  if(!d){alert('Vul een datum in.');return;}
  shifts.push({id:Date.now(),date:d,start:s,end:e,status:st,brk,rate,loc,note});
  shifts.sort((a,b)=>a.date.localeCompare(b.date));
  save();
  document.getElementById('inp-start').value='';
  document.getElementById('inp-end').value='';
  document.getElementById('inp-note').value='';
  listMode='month'; selectedDate=null;
  showScreen('home');
  renderCalendar(); renderList();
}

function markToday(){
  const d=new Date().toISOString().split('T')[0];
  document.getElementById('inp-date').value=d;
  document.getElementById('inp-status').value='worked';
}

function del(id){
  if(!confirm('Verwijderen?'))return;
  shifts=shifts.filter(s=>s.id!==id);
  save();renderCalendar();renderList();
}

function clearAll(){
  if(!confirm('Weet je zeker dat je alle diensten wilt wissen?'))return;
  shifts=[];save();renderCalendar();renderList();
}

function exportCSV(){
  if(!shifts.length){alert('Geen diensten om te exporteren.');return;}
  const rows=[['Datum','Dag','Begintijd','Eindtijd','Status','Uren','Pauze','Uurloon','Verdiend','Locatie','Notitie']];
  shifts.forEach(s=>{
    const d=new Date(s.date);
    const h=s.start&&s.end?hrs(s.start,s.end,s.brk||0):0;
    rows.push([s.date,DAYS_S[d.getDay()],s.start||'',s.end||'',s.status||'',h.toFixed(2),s.brk||0,s.rate||0,s.rate?+(h*s.rate).toFixed(2):0,s.loc||'',s.note||'']);
  });
  const csv=rows.map(r=>r.map(c=>`"${c}"`).join(',')).join('\n');
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);
  a.download='diensten.csv';a.click();
}

async function scanGmail(){
  const banner=document.getElementById('msg-banner');
  banner.style.display='block';
  banner.textContent='Gmail doorzoeken op roosters...';
  showScreen('home');
  try{
    const resp=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model:"claude-sonnet-4-6",max_tokens:1000,
        system:'Search Gmail for McDonald\'s rooster/schedule emails. Extract shifts. Return ONLY JSON array no markdown: [{"date":"YYYY-MM-DD","start":"HH:MM","end":"HH:MM","status":"planned","brk":30,"loc":"McDonald\'s"}]. If none found return [].',
        messages:[{role:"user",content:"Search my Gmail for McDonald's schedule emails and extract my work shifts."}],
        mcp_servers:[{type:"url",url:"https://gmailmcp.googleapis.com/mcp/v1",name:"gmail-mcp"}]
      })
    });
    const data=await resp.json();
    const combined=data.content.map(i=>i.type==='mcp_tool_result'?(i.content?.[0]?.text||''):i.type==='text'?i.text:'').join('\n');
    let found=[];
    try{const m=combined.match(/\[[\s\S]*?\]/);if(m)found=JSON.parse(m[0]);}catch(e){}
    if(!found.length){banner.textContent='Geen roosters gevonden in Gmail.';}
    else{
      let added=0;
      found.forEach(s=>{if(!shifts.find(x=>x.date===s.date&&x.start===s.start)){shifts.push({id:Date.now()+Math.random(),...s});added++;}});
      shifts.sort((a,b)=>a.date.localeCompare(b.date));
      save();renderCalendar();renderList();
      banner.textContent=`${added} dienst${added!==1?'en':''} geïmporteerd!`;
    }
  }catch(e){banner.textContent='Gmail niet bereikbaar. Voeg handmatig toe.';}
  setTimeout(()=>{banner.style.display='none';},4000);
}

if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
document.getElementById('inp-date').value=new Date().toISOString().split('T')[0];
renderCalendar();renderList();
