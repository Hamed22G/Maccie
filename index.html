<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#DA291C" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Mijn Diensten" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon.png" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css" />
  <title>Mijn Diensten – McDonald's</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --red: #DA291C;
      --red-dark: #b8220f;
      --red-light: #FFF0EF;
      --red-text: #993C1D;
      --bg: #f2f2f7;
      --card: #ffffff;
      --border: rgba(0,0,0,0.1);
      --text: #1c1c1e;
      --text2: #6c6c70;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #000000;
        --card: #1c1c1e;
        --border: rgba(255,255,255,0.1);
        --text: #ffffff;
        --text2: #8e8e93;
        --red-light: #3a1a18;
        --red-text: #ff8a7a;
      }
    }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }
    .app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }

    /* TOP BAR */
    .topbar {
      background: var(--red);
      padding: calc(var(--safe-top) + 14px) 16px 16px;
      color: white;
      flex-shrink: 0;
    }
    .topbar h1 { font-size: 20px; font-weight: 600; }
    .topbar p { font-size: 13px; opacity: 0.85; margin-top: 2px; }

    /* SCREENS */
    .screen { flex: 1; overflow-y: auto; display: none; flex-direction: column; }
    .screen.active { display: flex; }

    /* STATS */
    .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 14px 14px 0; }
    .stat { background: var(--card); border-radius: 14px; padding: 12px 14px; }
    .stat-lbl { font-size: 12px; color: var(--text2); margin-bottom: 2px; }
    .stat-val { font-size: 26px; font-weight: 600; color: var(--text); }
    .stat-sub { font-size: 12px; color: var(--text2); }

    /* TABS */
    .tab-row { display: flex; gap: 6px; padding: 12px 14px 0; }
    .tab-pill { flex: 1; text-align: center; padding: 6px 4px; font-size: 13px; border-radius: 99px; cursor: pointer; border: none; background: var(--card); color: var(--text2); font-family: inherit; }
    .tab-pill.active { background: var(--red); color: white; font-weight: 500; }

    /* BANNER */
    .banner { margin: 10px 14px 0; background: var(--card); border-radius: 12px; padding: 10px 14px; font-size: 13px; color: var(--text2); text-align: center; display: none; }

    /* SHIFTS */
    .sec-lbl { font-size: 13px; font-weight: 500; color: var(--text2); padding: 12px 14px 6px; text-transform: uppercase; letter-spacing: 0.04em; }
    .shifts-area { padding: 0 14px 100px; }
    .shift-card { background: var(--card); border-radius: 14px; padding: 12px 14px; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; }
    .shift-card.upcoming { border-left: 3px solid var(--red); border-radius: 0 14px 14px 0; }
    .date-col { text-align: center; min-width: 38px; }
    .date-day { font-size: 11px; font-weight: 500; color: var(--text2); text-transform: uppercase; }
    .date-num { font-size: 22px; font-weight: 600; color: var(--text); line-height: 1.1; }
    .date-mon { font-size: 11px; color: var(--text2); }
    .vline { width: 1px; height: 40px; background: var(--border); }
    .shift-mid { flex: 1; min-width: 0; }
    .shift-time { font-size: 15px; font-weight: 500; color: var(--text); }
    .shift-hrs { font-size: 13px; color: var(--text2); }
    .badge { font-size: 11px; padding: 2px 8px; border-radius: 99px; font-weight: 500; display: inline-block; margin-top: 3px; }
    .badge-today { background: var(--red); color: white; }
    .badge-up { background: var(--red-light); color: var(--red-text); }
    .badge-past { background: var(--bg); color: var(--text2); }
    .del-btn { background: none; border: none; cursor: pointer; color: var(--text2); font-size: 20px; padding: 6px; border-radius: 8px; line-height: 1; }
    .empty-state { text-align: center; padding: 3rem 1rem; color: var(--text2); font-size: 14px; }
    .empty-state i { font-size: 40px; display: block; margin-bottom: 10px; }

    /* ADD SCREEN */
    .add-top { background: var(--red); padding: calc(var(--safe-top) + 14px) 16px 16px; color: white; flex-shrink: 0; }
    .add-top h1 { font-size: 20px; font-weight: 600; }
    .add-content { padding: 14px; flex: 1; overflow-y: auto; padding-bottom: 100px; }
    .gmail-btn { width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 14px; font-size: 15px; color: var(--text); cursor: pointer; margin-bottom: 12px; font-family: inherit; }
    .gmail-btn:active { opacity: 0.7; }
    .card-form { background: var(--card); border-radius: 14px; padding: 14px; }
    .card-form h3 { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 14px; }
    .field-lbl { font-size: 12px; color: var(--text2); margin-bottom: 4px; display: block; }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
    .field-full { margin-bottom: 10px; }
    input[type=date], input[type=time], input[type=text] {
      font-size: 15px; width: 100%; padding: 10px 12px; border-radius: 10px;
      border: 1px solid var(--border); background: var(--bg); color: var(--text);
      font-family: inherit; -webkit-appearance: none;
    }
    .save-btn { width: 100%; background: var(--red); color: white; border: none; border-radius: 14px; padding: 14px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 6px; font-family: inherit; }
    .save-btn:active { background: var(--red-dark); }

    /* NAVBAR */
    .navbar {
      display: flex; background: var(--card); border-top: 1px solid var(--border);
      padding: 8px 0 calc(var(--safe-bottom) + 8px); flex-shrink: 0;
      position: fixed; bottom: 0; left: 0; right: 0;
    }
    .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; background: none; border: none; cursor: pointer; font-size: 11px; color: var(--text2); padding: 4px 0; font-family: inherit; }
    .nav-btn.active { color: var(--red); }
    .nav-btn i { font-size: 24px; }
  </style>
</head>
<body>
<div class="app">

  <!-- HOME SCREEN -->
  <div class="screen active" id="screen-home">
    <div class="topbar">
      <h1>Mijn diensten 🍟</h1>
      <p id="top-sub">Laden...</p>
    </div>
    <div class="stats-row">
      <div class="stat">
        <div class="stat-lbl">Deze maand</div>
        <div class="stat-val" id="s-count">0</div>
        <div class="stat-sub">diensten</div>
      </div>
      <div class="stat">
        <div class="stat-lbl">Gewerkte uren</div>
        <div class="stat-val" id="s-hours">0</div>
        <div class="stat-sub">deze maand</div>
      </div>
    </div>
    <div class="tab-row">
      <button class="tab-pill active" onclick="setTab('upcoming',this)">Aankomend</button>
      <button class="tab-pill" onclick="setTab('past',this)">Afgelopen</button>
      <button class="tab-pill" onclick="setTab('all',this)">Alles</button>
    </div>
    <div class="banner" id="msg-banner"></div>
    <div class="sec-lbl" id="sec-lbl">Aankomende diensten</div>
    <div class="shifts-area" id="shifts-list"></div>
  </div>

  <!-- ADD SCREEN -->
  <div class="screen" id="screen-add">
    <div class="add-top">
      <h1>Dienst toevoegen</h1>
    </div>
    <div class="add-content">
      <button class="gmail-btn" onclick="scanGmail()">
        <i class="ti ti-mail"></i> Importeer uit Gmail
      </button>
      <div class="card-form">
        <h3>Handmatig toevoegen</h3>
        <div class="field-full">
          <label class="field-lbl">Datum</label>
          <input type="date" id="inp-date" />
        </div>
        <div class="field-row">
          <div>
            <label class="field-lbl">Begintijd</label>
            <input type="time" id="inp-start" />
          </div>
          <div>
            <label class="field-lbl">Eindtijd</label>
            <input type="time" id="inp-end" />
          </div>
        </div>
        <div class="field-full">
          <label class="field-lbl">Locatie</label>
          <input type="text" id="inp-loc" placeholder="McDonald's Waardenburg" />
        </div>
        <button class="save-btn" onclick="addShift()">Opslaan</button>
      </div>
    </div>
  </div>

  <!-- NAVBAR -->
  <nav class="navbar">
    <button class="nav-btn active" id="nav-home" onclick="showScreen('home')">
      <i class="ti ti-home"></i><span>Thuis</span>
    </button>
    <button class="nav-btn" id="nav-add" onclick="showScreen('add')">
      <i class="ti ti-plus"></i><span>Toevoegen</span>
    </button>
    <button class="nav-btn" id="nav-stats" onclick="showScreen('home')">
      <i class="ti ti-chart-bar"></i><span>Stats</span>
    </button>
  </nav>
</div>

<script>
const DAYS=['zo','ma','di','wo','do','vr','za'];
const MONTHS=['jan','feb','mrt','apr','mei','jun','jul','aug','sep','okt','nov','dec'];
let shifts = JSON.parse(localStorage.getItem('mcdo_shifts') || '[]');
let tab = 'upcoming';

function save(){ localStorage.setItem('mcdo_shifts', JSON.stringify(shifts)); }

function hrs(s,e){
  const[sh,sm]=s.split(':').map(Number);
  const[eh,em]=e.split(':').map(Number);
  let m=(eh*60+em)-(sh*60+sm);
  if(m<0)m+=1440;
  return(m/60).toFixed(1);
}

function status(d){
  const t=new Date(); t.setHours(0,0,0,0);
  const x=new Date(d); x.setHours(0,0,0,0);
  if(x.getTime()===t.getTime()) return 'today';
  return x>t ? 'upcoming' : 'past';
}

function showScreen(s){
  document.querySelectorAll('.screen').forEach(sc=>sc.classList.remove('active'));
  document.getElementById('screen-'+s).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('nav-'+(s==='add'?'add':'home')).classList.add('active');
}

function setTab(t,el){
  tab=t;
  document.querySelectorAll('.tab-pill').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  render();
}

function addShift(){
  const d=document.getElementById('inp-date').value;
  const s=document.getElementById('inp-start').value;
  const e=document.getElementById('inp-end').value;
  const l=document.getElementById('inp-loc').value || "McDonald's";
  if(!d||!s||!e){ alert('Vul datum, begin- en eindtijd in.'); return; }
  shifts.push({ id:Date.now(), date:d, start:s, end:e, loc:l });
  shifts.sort((a,b)=>a.date.localeCompare(b.date));
  save(); render();
  document.getElementById('inp-start').value='';
  document.getElementById('inp-end').value='';
  document.getElementById('inp-loc').value='';
  showScreen('home');
}

function del(id){
  if(!confirm('Dienst verwijderen?')) return;
  shifts=shifts.filter(s=>s.id!==id);
  save(); render();
}

function render(){
  const today=new Date(); today.setHours(0,0,0,0);
  let list=shifts;
  if(tab==='upcoming'){
    list=shifts.filter(s=>{const d=new Date(s.date);d.setHours(0,0,0,0);return d>=today;});
    document.getElementById('sec-lbl').textContent='Aankomende diensten';
  } else if(tab==='past'){
    list=shifts.filter(s=>{const d=new Date(s.date);d.setHours(0,0,0,0);return d<today;}).reverse();
    document.getElementById('sec-lbl').textContent='Afgelopen diensten';
  } else {
    list=[...shifts].reverse();
    document.getElementById('sec-lbl').textContent='Alle diensten';
  }

  const el=document.getElementById('shifts-list');
  if(list.length===0){
    el.innerHTML='<div class="empty-state"><i class="ti ti-calendar-off"></i>Geen diensten gevonden</div>';
  } else {
    el.innerHTML=list.map(s=>{
      const d=new Date(s.date);
      const st=status(s.date);
      const h=hrs(s.start,s.end);
      const bc=st==='today'?'badge-today':st==='upcoming'?'badge-up':'badge-past';
      const bt=st==='today'?'Vandaag':st==='upcoming'?'Aankomend':'Afgelopen';
      const cc=st!=='past'?'shift-card upcoming':'shift-card';
      return `<div class="${cc}">
        <div class="date-col">
          <div class="date-day">${DAYS[d.getDay()]}</div>
          <div class="date-num">${d.getDate()}</div>
          <div class="date-mon">${MONTHS[d.getMonth()]}</div>
        </div>
        <div class="vline"></div>
        <div class="shift-mid">
          <div class="shift-time">${s.start} – ${s.end}</div>
          <div class="shift-hrs">${h} uur · ${s.loc}</div>
          <span class="badge ${bc}">${bt}</span>
        </div>
        <button class="del-btn" onclick="del(${s.id})"><i class="ti ti-trash"></i></button>
      </div>`;
    }).join('');
  }

  const now=new Date();
  const month=shifts.filter(s=>{const d=new Date(s.date);return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();});
  const totalH=month.reduce((a,s)=>a+parseFloat(hrs(s.start,s.end)),0);
  document.getElementById('s-count').textContent=month.length;
  document.getElementById('s-hours').textContent=totalH.toFixed(1);
  const upcoming=shifts.filter(s=>{const d=new Date(s.date);d.setHours(0,0,0,0);const t=new Date();t.setHours(0,0,0,0);return d>=t;});
  document.getElementById('top-sub').textContent=upcoming.length===0?'Geen diensten gepland':`${upcoming.length} dienst${upcoming.length!==1?'en':''} aankomend`;
}

async function scanGmail(){
  const banner=document.getElementById('msg-banner');
  banner.style.display='block';
  banner.textContent='Gmail doorzoeken...';
  showScreen('home');
  try{
    const resp=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model:"claude-sonnet-4-6",
        max_tokens:1000,
        system:"Search Gmail for McDonald's rooster or schedule emails. Extract shifts. Return ONLY a JSON array, no markdown: [{\"date\":\"YYYY-MM-DD\",\"start\":\"HH:MM\",\"end\":\"HH:MM\",\"loc\":\"McDonald's\"}]. If none found return [].",
        messages:[{role:"user",content:"Search my Gmail for McDonald's schedule emails and extract my work shifts."}],
        mcp_servers:[{type:"url",url:"https://gmailmcp.googleapis.com/mcp/v1",name:"gmail-mcp"}]
      })
    });
    const data=await resp.json();
    const combined=data.content.map(i=>i.type==='mcp_tool_result'?(i.content?.[0]?.text||''):i.type==='text'?i.text:'').join('\n');
    let found=[];
    try{const m=combined.match(/\[[\s\S]*\]/);if(m)found=JSON.parse(m[0]);}catch(e){}
    if(found.length===0){
      banner.textContent='Geen roosters gevonden in Gmail.';
    } else {
      let added=0;
      found.forEach(s=>{
        if(!shifts.find(x=>x.date===s.date&&x.start===s.start)){
          shifts.push({id:Date.now()+Math.random(),date:s.date,start:s.start,end:s.end,loc:s.loc||"McDonald's"});
          added++;
        }
      });
      shifts.sort((a,b)=>a.date.localeCompare(b.date));
      save(); render();
      banner.textContent=`${added} dienst${added!==1?'en':''} geïmporteerd!`;
    }
  } catch(e){
    banner.textContent='Gmail niet bereikbaar. Voeg handmatig toe.';
  }
  setTimeout(()=>{banner.style.display='none';},4000);
}

// Set default date
document.getElementById('inp-date').value=new Date().toISOString().split('T')[0];

// Register service worker
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}

render();
</script>
</body>
</html>
